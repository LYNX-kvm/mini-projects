<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List App</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="media/kvm-favicon.svg"
      type="image/x-icon" />
  </head>
  <body>
    <div class="container">
      <div class="todo-app">
        <h2>To-Do List <img src="media/icon.png" /></h2>
        <div class="row">
          <input type="text" id="input-box" placeholder="Add your to-do" />
          <button onclick="addTask()">Add</button>
        </div>
        <div class="error"><p>You need to write something!</p></div>

        <ul id="list-container"></ul>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
